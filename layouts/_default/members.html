{{- define "main" -}}

<article class="article">

  <div class="article-container shen-members-container pt-3">
    <h1>{{ .Title }}</h1>

    {{ with .Params.subtitle }}
    <p class="page-subtitle">{{ . | markdownify | emojify }}</p>
    {{ end }}
  </div>

  <div class="article-container shen-members-container">

    <div class="article-style">
      {{ .Content }}
    </div>

    {{ partial "page_footer" . }}

  </div>
</article>

{{- end -}}
